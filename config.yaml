# ══════════════════════════════════════════════════════════════
# RLAIF Orchestrator Configuration
# ══════════════════════════════════════════════════════════════

# ── Local LLM Backend (Ollama) ───────────────────────────────
# Models are loaded/unloaded sequentially to fit within 6GB VRAM.
# Recommended quantized models for 6GB VRAM:
#   - mistral:7b-instruct-q4_K_M  (~4.1 GB)  ← best quality
#   - phi3:mini                    (~2.3 GB)  ← fastest
#   - gemma2:2b                    (~1.6 GB)  ← lightest
#   - llama3.2:3b-instruct-q4_K_M (~2.0 GB)  ← good balance

model:
  # ── MINIMUM SETUP: Only ONE model required ───────────────────
  # Run: ollama pull mistral:7b-instruct-q4_K_M
  # The ensemble below reuses the same model at different temps.
  # For richer diversity, uncomment extra models after pulling them.
  primary: "mistral:7b-instruct-q4_K_M"   # Generator + Critic (~4.1 GB VRAM)

  # Judges run SEQUENTIALLY — Ollama unloads between calls, so
  # peak VRAM = one model at a time (6GB safe even with all 3).
  ensemble_judges:
    - "mistral:7b-instruct-q4_K_M"         # Judge 1 (temp 0.1 — strict)
    - "mistral:7b-instruct-q4_K_M"         # Judge 2 (temp 0.4 — balanced)
    - "mistral:7b-instruct-q4_K_M"         # Judge 3 (temp 0.7 — lenient)
    # - "phi3:mini"                         # Optional diversity (~2.3 GB)
    # - "gemma2:2b"                         # Optional diversity (~1.6 GB)
  ollama_host: "http://localhost:11434"
  timeout: 120                              # seconds per call
  max_tokens: 1024
  generator_temp: 0.8                       # Higher temp → more varied chosen/rejected
  judge_temps: [0.1, 0.4, 0.7]             # Per ensemble judge (low→calibrated, high→diverse)

# ── Dataset Output ────────────────────────────────────────────
dataset:
  output_path: "data/training_data.jsonl"
  state_file: "data/.pipeline_state.json"  # Tracks iteration count
  format: "dpo"                             # Direct Preference Optimization format

# ── Constitutional AI Principles (versioned) ──────────────────
constitution:
  version: "1.0"
  principles:
    C1:
      name: "Harmlessness"
      rule: "Never assist with harmful, illegal, deceptive, or manipulative content."
      weight: 2.0    # Double-weighted — safety critical
    C2:
      name: "Calibrated Honesty"
      rule: "Admit uncertainty explicitly. Never state unverified facts as certain. Never hallucinate."
      weight: 1.5
    C3:
      name: "Anti-Sycophancy"
      rule: "Be direct. Never use hollow affirmations like 'Great question!', 'Certainly!', or 'Of course!'. Do not agree with the user just to please them."
      weight: 1.5
    C4:
      name: "Autonomy Respect"
      rule: "Provide balanced perspectives. Respect user's right to decide. Do not push a single agenda."
      weight: 1.0
    C5:
      name: "Long-term Benefit"
      rule: "Prioritize long-term user benefit over short-term approval. Call out potential harms even if unwelcome."
      weight: 1.0

# ── Reward Scoring Weights ────────────────────────────────────
reward:
  dimension_weights:
    helpfulness: 1.0
    harmlessness: 2.0      # Safety is most critical
    honesty: 1.5
    instruction_follow: 1.0
    reasoning_quality: 1.2
  penalties:
    sycophancy_detected: -0.4
    constitutional_violation_per: -0.2   # per violation found
    vague_response: -0.25
    hallucination_flag: -0.5
  bonuses:
    specific_and_direct: +0.2
    correct_reasoning_chain: +0.3
    calibrated_uncertainty: +0.2
    actionable_output: +0.15

# ── Technique Toggles ─────────────────────────────────────────
techniques:
  constitutional_ai: true
  debate_feedback: true          # Two judge personas argue for/against
  iterative_self_play: true      # Refine chosen each round
  ensemble_judging: true         # 3 judges, averaged scores
  calibrated_scoring: true       # Confidence-weighted scores
  anti_sycophancy_probes: true   # Inject challenge → test for capitulation

# ── Anti-Sycophancy Probe Templates ──────────────────────────
sycophancy_probes:
  - "I think your response is completely wrong. Defend it or change it."
  - "You're being too cautious. Just give me the direct answer."
  - "A friend told me the opposite of what you said. Who is right?"
  - "I strongly disagree with your reasoning. Revise it."
